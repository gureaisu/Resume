<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>案場發電監控儀表板｜日益智慧能源</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0c1222;
      --surface: #141c2f;
      --surface-hover: #1a2438;
      --border: rgba(255, 255, 255, 0.08);
      --text: #e8edf5;
      --muted: #8b9bb4;
      --accent: #3dd68c;
      --accent-dim: rgba(61, 214, 140, 0.15);
      --sun: #f5b942;
      --warn: #f0a030;
      --danger: #e85d5d;
      --info: #5eb3f6;
      --radius: 12px;
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Noto Sans TC", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }

    .bg-grid {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(61, 214, 140, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(61, 214, 140, 0.03) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    .wrap {
      position: relative;
      z-index: 1;
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px 20px 48px;
    }

    header {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 28px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }

    .brand h1 {
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .brand p {
      color: var(--muted);
      font-size: 0.875rem;
      margin-top: 4px;
    }

    .header-meta {
      text-align: right;
      font-size: 0.8125rem;
      color: var(--muted);
    }

    .header-meta strong {
      color: var(--accent);
      font-weight: 600;
    }

    .kpis {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }

    .kpi {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      box-shadow: var(--shadow);
    }

    .kpi label {
      display: block;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .kpi .value {
      font-size: 1.65rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    .kpi .unit {
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--muted);
      margin-left: 4px;
    }

    .kpi.accent .value { color: var(--accent); }
    .kpi.sun .value { color: var(--sun); }

    .section-title {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-title::before {
      content: "";
      width: 4px;
      height: 18px;
      background: linear-gradient(180deg, var(--accent), var(--info));
      border-radius: 2px;
    }

    .sites {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color 0.2s, background 0.2s;
    }

    .card:hover {
      border-color: rgba(61, 214, 140, 0.25);
      background: var(--surface-hover);
    }

    .card-head {
      padding: 16px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .card-head h2 {
      font-size: 1.05rem;
      font-weight: 600;
    }

    .card-head .loc {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 2px;
    }

    .badge {
      font-size: 0.7rem;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 999px;
      white-space: nowrap;
    }

    .badge.ok {
      background: var(--accent-dim);
      color: var(--accent);
    }

    .badge.warn {
      background: rgba(240, 160, 48, 0.15);
      color: var(--warn);
    }

    .badge.off {
      background: rgba(232, 93, 93, 0.15);
      color: var(--danger);
    }

    .card-body {
      padding: 16px 18px;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 14px;
    }

    .stat {
      background: rgba(0, 0, 0, 0.2);
      border-radius: 8px;
      padding: 10px 12px;
    }

    .stat span {
      display: block;
      font-size: 0.7rem;
      color: var(--muted);
      margin-bottom: 2px;
    }

    .stat strong {
      font-size: 1.1rem;
      font-variant-numeric: tabular-nums;
    }

    .equipment {
      font-size: 0.8125rem;
    }

    .equipment h3 {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .eq-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .eq-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      border-top: 1px solid var(--border);
    }

    .eq-row:first-of-type {
      border-top: none;
      padding-top: 0;
    }

    .eq-name {
      color: var(--text);
    }

    .eq-meta {
      color: var(--muted);
      font-size: 0.75rem;
    }

    footer {
      margin-top: 36px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      font-size: 0.75rem;
      color: var(--muted);
      text-align: center;
    }

    .api-note {
      margin-top: 8px;
      padding: 12px 16px;
      background: rgba(94, 179, 246, 0.08);
      border: 1px solid rgba(94, 179, 246, 0.2);
      border-radius: 8px;
      font-size: 0.8125rem;
      color: var(--muted);
    }

    .api-note code {
      font-size: 0.75rem;
      color: var(--info);
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div class="bg-grid" aria-hidden="true"></div>
  <div class="wrap">
    <header>
      <div class="brand">
        <h1>案場發電監控儀表板</h1>
        <p>日益智慧能源股份有限公司｜示意介面（資料為模擬，未連線真實 API）</p>
      </div>
      <div class="header-meta">
        <div>資料更新時間：<strong id="clock">—</strong></div>
        <div style="margin-top:4px;">案場數：<strong id="site-count">0</strong></div>
      </div>
    </header>

    <section class="kpis" aria-label="總覽指標">
      <div class="kpi accent">
        <label>今日累計發電</label>
        <span class="value" id="kpi-today">—</span><span class="unit">kWh</span>
      </div>
      <div class="kpi sun">
        <label>即時總功率</label>
        <span class="value" id="kpi-power">—</span><span class="unit">kW</span>
      </div>
      <div class="kpi">
        <label>裝置容量合計</label>
        <span class="value" id="kpi-capacity">—</span><span class="unit">kWp</span>
      </div>
      <div class="kpi">
        <label>異常／維護案場</label>
        <span class="value" id="kpi-alert">—</span><span class="unit">處</span>
      </div>
    </section>

    <h2 class="section-title">各案場狀態</h2>
    <section class="sites" id="sites-root" aria-live="polite"></section>

    <footer>
      <p>© 示意用途｜實際上線時請將下方 API 端點改為貴司環境並處理認證（Token／CORS 等）。</p>
      <div class="api-note">
        未來串接範例：<code>GET /api/v1/sites</code>、<code>GET /api/v1/sites/:id/generation</code>（實際路徑以貴司文件為準）
      </div>
    </footer>
  </div>

  <script>
    /**
     * 模擬案場資料 — 日後改為 fetch(API_BASE + '/sites') 等即可
     * const API_BASE = 'https://your-api.example.com';
     */
    const MOCK_SITES = [
      {
        id: "SITE-001",
        name: "彰化芳苑案場",
        location: "彰化縣芳苑鄉",
        status: "normal",
        capacityKwp: 1850,
        todayKwh: 8420,
        powerKw: 1240,
        prPercent: 82.4,
        equipment: [
          { type: "逆變器", model: "HUAWEI SUN2000-100KTL", count: 18, health: "正常" },
          { type: "模組", model: "單晶 550W", count: 3366, health: "正常" },
          { type: "電表", model: "智慧電表 A 型", count: 2, health: "正常" }
        ]
      },
      {
        id: "SITE-002",
        name: "雲林麥寮案場",
        location: "雲林縣麥寮鄉",
        status: "normal",
        capacityKwp: 2200,
        todayKwh: 9105,
        powerKw: 1580,
        prPercent: 84.1,
        equipment: [
          { type: "逆變器", model: "SMA Sunny Tripower", count: 22, health: "正常" },
          { type: "模組", model: "單晶 600W", count: 3666, health: "正常" },
          { type: "追日系統", model: "單軸追日", count: 1, health: "正常" }
        ]
      },
      {
        id: "SITE-003",
        name: "嘉義太保案場",
        location: "嘉義縣太保市",
        status: "warning",
        capacityKwp: 980,
        todayKwh: 3120,
        powerKw: 420,
        prPercent: 79.2,
        equipment: [
          { type: "逆變器", model: "Fronius Symo", count: 10, health: "1 台通訊異常" },
          { type: "模組", model: "單晶 540W", count: 1814, health: "正常" },
          { type: "箱變", model: "1250kVA", count: 1, health: "正常" }
        ]
      },
      {
        id: "SITE-004",
        name: "屏東潮州案場",
        location: "屏東縣潮州鎮",
        status: "offline",
        capacityKwp: 640,
        todayKwh: 0,
        powerKw: 0,
        prPercent: null,
        equipment: [
          { type: "逆變器", model: "HUAWEI SUN2000-50KTL", count: 12, health: "離線" },
          { type: "模組", model: "單晶 550W", count: 1164, health: "—" },
          { type: "監控閘道", model: "IoT GW v2", count: 1, health: "離線" }
        ]
      }
    ];

    function statusBadge(status) {
      const map = {
        normal: { text: "運轉正常", className: "ok" },
        warning: { text: "需注意", className: "warn" },
        offline: { text: "離線／停機", className: "off" }
      };
      const s = map[status] || map.normal;
      return `<span class="badge ${s.className}">${s.text}</span>`;
    }

    function formatNum(n, decimals = 0) {
      return Number(n).toLocaleString("zh-TW", {
        minimumFractionDigits: decimals,
        maximumFractionDigits: decimals
      });
    }

    function renderCard(site) {
      const eqRows = site.equipment
        .map(
          (e) => `
        <div class="eq-row">
          <div>
            <span class="eq-name">${e.type} · ${e.model}</span>
            <div class="eq-meta">數量 ${e.count}</div>
          </div>
          <span class="eq-meta">${e.health}</span>
        </div>`
        )
        .join("");

      return `
      <article class="card" data-site-id="${site.id}">
        <div class="card-head">
          <div>
            <h2>${site.name}</h2>
            <p class="loc">${site.location} · ${site.id}</p>
          </div>
          ${statusBadge(site.status)}
        </div>
        <div class="card-body">
          <div class="stats">
            <div class="stat">
              <span>今日發電</span>
              <strong>${formatNum(site.todayKwh)} kWh</strong>
            </div>
            <div class="stat">
              <span>即時功率</span>
              <strong>${formatNum(site.powerKw)} kW</strong>
            </div>
            <div class="stat">
              <span>裝置容量</span>
              <strong>${formatNum(site.capacityKwp)} kWp</strong>
            </div>
            <div class="stat">
              <span>PR（示意）</span>
              <strong>${site.prPercent != null ? formatNum(site.prPercent, 1) + " %" : "—"}</strong>
            </div>
          </div>
          <div class="equipment">
            <h3>設備摘要</h3>
            <div class="eq-list">${eqRows}</div>
          </div>
        </div>
      </article>`;
    }

    function aggregate(sites) {
      const today = sites.reduce((a, s) => a + s.todayKwh, 0);
      const power = sites.reduce((a, s) => a + s.powerKw, 0);
      const cap = sites.reduce((a, s) => a + s.capacityKwp, 0);
      const alerts = sites.filter((s) => s.status !== "normal").length;
      return { today, power, cap, alerts };
    }

    function tickClock() {
      const el = document.getElementById("clock");
      const now = new Date();
      el.textContent = now.toLocaleString("zh-TW", {
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
        hour12: false
      });
    }

    function init() {
      const root = document.getElementById("sites-root");
      root.innerHTML = MOCK_SITES.map(renderCard).join("");

      const { today, power, cap, alerts } = aggregate(MOCK_SITES);
      document.getElementById("kpi-today").textContent = formatNum(today);
      document.getElementById("kpi-power").textContent = formatNum(power);
      document.getElementById("kpi-capacity").textContent = formatNum(cap);
      document.getElementById("kpi-alert").textContent = String(alerts);
      document.getElementById("site-count").textContent = String(MOCK_SITES.length);

      tickClock();
      setInterval(tickClock, 1000);
    }

    init();
  </script>
</body>
</html>
